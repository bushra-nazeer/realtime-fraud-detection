services:
  api:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"

  # Optional real Kafka path: `docker compose --profile kafka up`
  # Then run the producer/consumer against localhost:9092.
  redpanda:
    image: redpandadata/redpanda:v24.1.7
    command: >
      redpanda start --overprovisioned --smp 1 --memory 512M
      --reserve-memory 0M --node-id 0 --check=false
      --kafka-addr PLAINTEXT://0.0.0.0:9092
      --advertise-kafka-addr PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
    profiles: ["kafka"]
